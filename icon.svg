<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background negro con esquinas redondeadas -->
  <rect width="512" height="512" rx="110" fill="#0a0a0a"/>

  <!-- Cuerpo del trofeo (copa) - amarillo dorado -->
  <path d="M160 70 h192 v10 l-10 130 c-8 60-46 100-86 114 -40-14-78-54-86-114 l-10-130 Z" fill="#FFD700"/>

  <!-- Brillo interior copa -->
  <path d="M185 80 h142 v8 l-8 110 c-6 48-36 82-63 96 -27-14-57-48-63-96 l-8-110 Z" fill="#FFE44D"/>

  <!-- Asa izquierda -->
  <path d="M160 90 C160 90 100 90 90 140 C80 190 110 220 150 215" 
        fill="none" stroke="#FFD700" stroke-width="22" stroke-linecap="round"/>

  <!-- Asa derecha -->
  <path d="M352 90 C352 90 412 90 422 140 C432 190 402 220 362 215" 
        fill="none" stroke="#FFD700" stroke-width="22" stroke-linecap="round"/>

  <!-- Cuello/stem -->
  <path d="M220 324 C210 340 205 360 208 375 l96 0 c3-15-2-35-12-51 Z" fill="#C8960C"/>

  <!-- Base plataforma - marrón dorado -->
  <rect x="155" y="375" width="202" height="36" rx="14" fill="#8B6914"/>
  <!-- Brillo base -->
  <rect x="165" y="375" width="182" height="14" rx="7" fill="#A07820"/>

  <!-- Pie base más ancho -->
  <rect x="135" y="408" width="242" height="30" rx="14" fill="#6B4F0A"/>
  <!-- Brillo pie -->
  <rect x="148" y="408" width="216" height="12" rx="6" fill="#8B6914"/>

  <!-- Estrella en la copa -->
  <polygon points="256,105 263,128 288,128 268,143 275,166 256,151 237,166 244,143 224,128 249,128"
           fill="#FFA500" opacity="0.9"/>

  <!-- Brillo lateral copa izquierda -->
  <path d="M195 95 Q205 120 200 160" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="12" stroke-linecap="round"/>
</svg>
